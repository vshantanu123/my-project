apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-project-service
  labels:
    app: my-project-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-project-service
  template:
    metadata:
      labels:
        app: my-project-service
    spec:
      containers:
        - name: my-project-service
          image: my-project-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: my-project-service
spec:
  type: NodePort
  selector:
    app: my-project-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
